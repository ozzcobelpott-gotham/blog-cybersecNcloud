baseURL = 'https://ozzcobelpott-gotham.github.io/blog-cybersecNcloud/'
title = 'Gotham Blog'
theme = 'PaperMod'
defaultContentLanguage = 'es'

# --- Variables Globales para SEO y Redes Sociales ---
description = "Investigación en Ciberseguridad Ofensiva, Automatización Cloud y Desarrollo Backend."
author = "Oswald Cobblepot"

[params]
  defaultTheme = "dark"
  disableThemeToggle = true
  ShowLanguageSwitcher = true
  disableSpecial1stPost = true
  
  # --- Entorno y portada ---
  env = "production" # Forzar la generación de todas las etiquetas SEO
  images = ["images/gotham-cover.png"] # La imagen que saldrá en LinkedIn al compartir la web principal

  [params.assets]
    favicon = "/blog-cybersecNcloud/favicon.ico"

  # --- Botones sociales (Opcional, aparecen en el footer o página principal) ---
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/tu-perfil-real"
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/ozzcobelpott-gotham"

[languages]
  [languages.es]
    languageName = 'Español'
    title = 'Gotham Blog'
    weight = 1
    
    # Menú en Español
    [[languages.es.menu.main]]
      name = "Artículos"
      pageRef = "/posts"
      weight = 1
    [[languages.es.menu.main]]
      name = "Sobre Mí"
      pageRef = "/about"
      weight = 2

  [languages.en]
    languageName = 'English'
    title = 'Gotham Blog'
    weight = 2
    
    # Menú en Inglés
    [[languages.en.menu.main]]
      name = "Posts"
      pageRef = "/posts"
      weight = 1
    [[languages.en.menu.main]]
      name = "About Me"
      pageRef = "/about"
      weight = 2